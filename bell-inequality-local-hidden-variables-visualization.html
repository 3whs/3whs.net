<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bell Inequality Visualization</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
      overflow: auto;
    }

    body {
      padding: 16px;
    }

    #page {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      align-items: center;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
    }

    #controls label,
    .controlMetric {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
      font-size: 15px;
    }

    #controls input[type="number"] {
      width: 72px;
      padding: 4px 6px;
      background: #1a1a1a;
      color: #f0f0f0;
      border: 1px solid #444;
      border-radius: 4px;
    }

    .controlMetric strong {
      color: #fff;
      font-weight: 700;
    }

    #canvasStack {
      position: relative;
      width: 100%;
      height: 68vh;
      min-height: 420px;
      background: #000;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }

    #canvasStack canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      display: block;
    }

    #wedgeCanvas {
      z-index: 1;
    }

    #lineCanvas {
      z-index: 2;
    }

    .graphPanel {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
    }

    .graphPanel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .graphCanvas {
      display: block;
      width: 100%;
      height: 280px;
      background: #080808;
      border: 1px solid #222;
      border-radius: 6px;
    }

    @media (max-width: 900px) {
      #canvasStack {
        height: 56vh;
      }
    }
  </style>
</head>

    function parseDataset(text) {
      return text
        .trim()
        .split(/\n+/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const match = line.match(/^(\d+)\s*,?\s*([0-9.]+)%$/);

          if (!match) {
            throw new Error(`Could not parse dataset line: "${line}"`);
          }

          return {
            diff: Number(match[1]),
            percentSame: Number(match[2])
          };
        });
    }

    const lhvData = parseDataset(lhvDataText);
    const qmData = parseDataset(qmDataText);

    const lhvDataByDiff = new Map(lhvData.map(row => [row.diff, row.percentSame]));
    const qmDataByDiff = new Map(qmData.map(row => [row.diff, row.percentSame]));

    function generateData(diff) {
      const data = [];

      for (let anglePrimary = 0; anglePrimary < 180; anglePrimary++) {
        const angleMirror = anglePrimary + 180;
        const anglePrimaryState = Number(state[anglePrimary]);

        const apNegPair = (anglePrimary - diff + 360) % 360;
        const apPosPair = (anglePrimary + diff) % 360;
        const amNegPair = (angleMirror - diff + 360) % 360;
        const amPosPair = (angleMirror + diff) % 360;

        data.push({
          line: [
            anglePrimary,
            angleMirror,
            anglePrimaryState
          ],
          wedges: [
            [
              anglePrimary,
              apNegPair,
              Number(anglePrimaryState === 1 - Number(state[apNegPair]))
            ],
            [
              anglePrimary,
              apPosPair,
              Number(anglePrimaryState === 1 - Number(state[apPosPair]))
            ],
            [
              angleMirror,
              amNegPair,
              Number(anglePrimaryState === 1 - Number(state[amNegPair]))
            ],
            [
              angleMirror,
              amPosPair,
              Number(anglePrimaryState === 1 - Number(state[amPosPair]))
            ]
          ]
        });
      }

      return data;
    }

    function getLineColor(lineState) {
      return lineState === 1 ? "#00ff66" : "#ff3333";
    }

    function getOppositeLineColor(lineState) {
      return lineState === 1 ? "#ff3333" : "#00ff66";
    }

    function degToRad(degrees) {
      return degrees * Math.PI / 180;
    }

    function canvasAngle(degrees) {
      return -degToRad(degrees);
    }

    function normalizeAngle(angle) {
      return ((angle % 360) + 360) % 360;
    }

    function pointOnAngle(angle, distance) {
      const radians = degToRad(angle);

      return {
        x: Math.cos(radians) * distance,
        y: -Math.sin(radians) * distance
      };
    }

    function shortestAngleDiff(fromAngle, toAngle) {
      return ((toAngle - fromAngle + 540) % 360) - 180;
    }

    function drawLineSegment(ctx, angle, innerRadius, outerRadius, lineState) {
      const midRadius = innerRadius + (outerRadius - innerRadius) / 2;

      const innerPoint = pointOnAngle(angle, innerRadius);
      const midPoint = pointOnAngle(angle, midRadius);
      const outerPoint = pointOnAngle(angle, outerRadius);

      ctx.beginPath();
      ctx.moveTo(innerPoint.x, innerPoint.y);
      ctx.lineTo(midPoint.x, midPoint.y);
      ctx.strokeStyle = getLineColor(lineState);
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(midPoint.x, midPoint.y);
      ctx.lineTo(outerPoint.x, outerPoint.y);
      ctx.strokeStyle = getOppositeLineColor(lineState);
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawLine(ctx, angleA, angleB, innerRadius, outerRadius, lineState) {
      drawLineSegment(ctx, angleA, innerRadius, outerRadius, lineState);
      drawLineSegment(ctx, angleB, innerRadius, outerRadius, lineState);
    }

    function createAngleBins(angleStep) {
      const binCount = Math.round(360 / angleStep);

      return Array.from({ length: binCount }, () => ({
        totalOverlapCount: 0,
        redOverlapCount: 0,
        greenOverlapCount: 0
      }));
    }

    function accumulateWedgeInBins(bins, angleA, angleB, wedgeState, angleStep) {
      const sweep = shortestAngleDiff(angleA, angleB);
      const steps = Math.max(1, Math.ceil(Math.abs(sweep) / angleStep));

      for (let i = 0; i < steps; i++) {
        const t = i / steps;
        const angle = normalizeAngle(angleA + sweep * t);
        const binIndex = Math.floor(angle / angleStep) % bins.length;
        const bin = bins[binIndex];

        bin.totalOverlapCount += 1;

        if (wedgeState === 1) {
          bin.greenOverlapCount += 1;
        } else {
          bin.redOverlapCount += 1;
        }
      }
    }

    function drawAngleSlice(ctx, startAngle, endAngle, radius, fillStyle) {
      const startRad = canvasAngle(startAngle);
      const endRad = canvasAngle(endAngle);
      const startPoint = pointOnAngle(startAngle, radius);

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(startPoint.x, startPoint.y);
      ctx.arc(0, 0, radius, startRad, endRad, true);
      ctx.closePath();

      ctx.fillStyle = fillStyle;
      ctx.fill();
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

	function getAngleBinFillStyle(bin) {
	  const totalOverlapCount = bin.totalOverlapCount;
	  const greenOverlapCount = bin.greenOverlapCount;

	  if (totalOverlapCount === 0) {
		return null;
	  }

	  const greenRatio = greenOverlapCount / totalOverlapCount;

	  const redColor = { r: 255, g: 0, b: 0 };
	  const blackColor = { r: 0, g: 0, b: 0 };
	  const greenColor = { r: 0, g: 255, b: 0 };

	  let r;
	  let g;
	  let b;

	  if (greenRatio <= 0.5) {
		const t = greenRatio / 0.5;

		r = Math.round(lerp(redColor.r, blackColor.r, t));
		g = Math.round(lerp(redColor.g, blackColor.g, t));
		b = Math.round(lerp(redColor.b, blackColor.b, t));
	  } else {
		const t = (greenRatio - 0.5) / 0.5;

		r = Math.round(lerp(blackColor.r, greenColor.r, t));
		g = Math.round(lerp(blackColor.g, greenColor.g, t));
		b = Math.round(lerp(blackColor.b, greenColor.b, t));
	  }

	  const alpha = 0.95;

	  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
	}

    function drawAccumulatedBins(ctx, bins, radius, angleStep) {
      for (let i = 0; i < bins.length; i++) {
        const bin = bins[i];
        const fillStyle = getAngleBinFillStyle(bin);

        if (!fillStyle) {
          continue;
        }

        const startAngle = i * angleStep;
        const endAngle = startAngle + angleStep;

        drawAngleSlice(ctx, startAngle, endAngle, radius, fillStyle);
      }
    }

    function resizeCanvasToElement(canvas, ctx) {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();

      canvas.width = Math.max(1, Math.round(rect.width * dpr));
      canvas.height = Math.max(1, Math.round(rect.height * dpr));

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function resizeAllCanvases() {
      resizeCanvasToElement(wedgeCanvas, wedgeCtx);
      resizeCanvasToElement(lineCanvas, lineCtx);
      resizeCanvasToElement(comparisonGraphCanvas, comparisonGraphCtx);

      drawAllLayers();
      drawGraphs();
      updateDiffInfo();
    }

    function clearCanvas(ctx) {
      const rect = ctx.canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
    }

    function getVisualizationLayout() {
      const rect = canvasStack.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      const wedgeRadius = Math.min(width, height) * 0.32;

      return {
        width,
        height,
        centerX: width / 2,
        centerY: height / 2,
        wedgeRadius,
        lineInnerRadius: wedgeRadius,
        lineOuterRadius: Math.min(width, height) * 0.48,
        angleStep: 1
      };
    }

    function drawWedgeLayer(ctx, data, wedgeRadius, angleStep) {
      const bins = createAngleBins(angleStep);

      for (let i = 0; i < data.length; i++) {
        const item = data[i];

        for (let w = 0; w < item.wedges.length; w++) {
          const wedge = item.wedges[w];
          const wedgeAngleA = wedge[0];
          const wedgeAngleB = wedge[1];
          const wedgeState = wedge[2];

          accumulateWedgeInBins(
            bins,
            wedgeAngleA,
            wedgeAngleB,
            wedgeState,
            angleStep
          );
        }
      }

      drawAccumulatedBins(ctx, bins, wedgeRadius, angleStep);
    }

    function drawLineLayer(ctx, data, lineInnerRadius, lineOuterRadius) {
      for (let i = 0; i < data.length; i++) {
        const item = data[i];

        const line = item.line;
        const angleSmall = line[0];
        const angleBig = line[1];
        const lineState = line[2];

        drawLine(
          ctx,
          angleSmall,
          angleBig,
          lineInnerRadius,
          lineOuterRadius,
          lineState
        );
      }
    }

    function drawWedgeLayerOnly() {
      const layout = getVisualizationLayout();
      const data = generateData(diff);

      clearCanvas(wedgeCtx);

      wedgeCtx.save();
      wedgeCtx.translate(layout.centerX, layout.centerY);
      drawWedgeLayer(
        wedgeCtx,
        data,
        layout.wedgeRadius,
        layout.angleStep
      );
      wedgeCtx.restore();
    }

    function drawLineLayerOnly() {
      const layout = getVisualizationLayout();
      const data = generateData(diff);

      clearCanvas(lineCtx);

      lineCtx.save();
      lineCtx.translate(layout.centerX, layout.centerY);
      drawLineLayer(
        lineCtx,
        data,
        layout.lineInnerRadius,
        layout.lineOuterRadius
      );
      lineCtx.restore();
    }

    function drawAllLayers() {
      drawWedgeLayerOnly();
      drawLineLayerOnly();
    }

    function drawComparisonGraph(ctx, lhvData, qmData, selectedDiff) {
      const rect = ctx.canvas.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;

      clearCanvas(ctx);

      ctx.fillStyle = "#080808";
      ctx.fillRect(0, 0, width, height);

      const margin = {
        top: 22,
        right: 24,
        bottom: 40,
        left: 48
      };

      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;

      function xForDiff(value) {
        return margin.left + (value / 180) * plotWidth;
      }

      function yForPercent(value) {
        return margin.top + plotHeight - (value / 100) * plotHeight;
      }

      ctx.strokeStyle = "#242424";
      ctx.lineWidth = 1;

      const yTicks = [0, 25, 50, 75, 100];

      for (const tick of yTicks) {
        const y = yForPercent(tick);

        ctx.beginPath();
        ctx.moveTo(margin.left, y);
        ctx.lineTo(width - margin.right, y);
        ctx.stroke();
      }

      const xTicks = [0, 45, 90, 135, 180];

      for (const tick of xTicks) {
        const x = xForDiff(tick);

        ctx.beginPath();
        ctx.moveTo(x, margin.top);
        ctx.lineTo(x, height - margin.bottom);
        ctx.stroke();
      }

      ctx.strokeStyle = "#aaaaaa";
      ctx.lineWidth = 1.25;

      ctx.beginPath();
      ctx.moveTo(margin.left, margin.top);
      ctx.lineTo(margin.left, height - margin.bottom);
      ctx.lineTo(width - margin.right, height - margin.bottom);
      ctx.stroke();

      ctx.fillStyle = "#cfcfcf";
      ctx.font = "12px system-ui, sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";

      for (const tick of yTicks) {
        const y = yForPercent(tick);
        ctx.fillText(`${tick}%`, margin.left - 8, y);
      }

      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      for (const tick of xTicks) {
        const x = xForDiff(tick);
        ctx.fillText(`${tick}`, x, height - margin.bottom + 8);
      }

      function drawDataLine(data, color, lineWidth) {
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();

        for (let i = 0; i < data.length; i++) {
          const row = data[i];
          const x = xForDiff(row.diff);
          const y = yForPercent(row.percentSame);

          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }

        ctx.stroke();
      }

      drawDataLine(lhvData, "#42a5f5", 2.5);
      drawDataLine(qmData, "#ffd54f", 2.5);

      const selectedLhv = lhvData.find(row => row.diff === selectedDiff);
      const selectedQm = qmData.find(row => row.diff === selectedDiff);
      const selectedX = xForDiff(selectedDiff);

      ctx.strokeStyle = "#888";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(selectedX, margin.top);
      ctx.lineTo(selectedX, height - margin.bottom);
      ctx.stroke();

      function drawPoint(row, color) {
        if (!row) {
          return;
        }

        const x = xForDiff(row.diff);
        const y = yForPercent(row.percentSame);

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 4.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      drawPoint(selectedLhv, "#7cc4ff");
      drawPoint(selectedQm, "#ffe082");

      const legendX = margin.left + 8;
      const legendY = margin.top + 8;

      ctx.font = "12px system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";

      ctx.fillStyle = "#42a5f5";
      ctx.fillRect(legendX, legendY - 5, 18, 3);

      ctx.fillStyle = "#cfcfcf";
      ctx.fillText("Local Hidden Variable", legendX + 26, legendY);

      ctx.fillStyle = "#ffd54f";
      ctx.fillRect(legendX, legendY + 17, 18, 3);

      ctx.fillStyle = "#cfcfcf";
      ctx.fillText("Observed / Quantum Mechanics", legendX + 26, legendY + 22);
    }

    function drawGraphs() {
      drawComparisonGraph(
        comparisonGraphCtx,
        lhvData,
        qmData,
        diff
      );
    }

    function formatPercent(value) {
      return `${value.toFixed(2)}%`;
    }

    function updateDiffInfo() {
      const lhvPercent = lhvDataByDiff.get(diff);
      const qmPercent = qmDataByDiff.get(diff);

      lhvValue.textContent = lhvPercent !== undefined
        ? formatPercent(lhvPercent)
        : "n/a";

      observedValue.textContent = qmPercent !== undefined
        ? formatPercent(qmPercent)
        : "n/a";
    }

    function clampDiff(value) {
      if (Number.isNaN(value)) {
        return 0;
      }

      return Math.max(0, Math.min(180, value));
    }

    function updateForDiffChange() {
      drawWedgeLayerOnly();
      drawGraphs();
      updateDiffInfo();
    }

    diffInput.addEventListener("input", () => {
      diff = clampDiff(Number(diffInput.value));
      updateForDiffChange();
    });

    diffInput.addEventListener("change", () => {
      diff = clampDiff(Number(diffInput.value));
      diffInput.value = diff;
      updateForDiffChange();
    });

    window.addEventListener("resize", resizeAllCanvases);

    resizeAllCanvases();
    diffInput.value = diff;
    updateDiffInfo();
  </script>
</body>
</html>
